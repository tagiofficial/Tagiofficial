<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vizitka Yarat - TAGIOFFICIAL</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
.wrap { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; }
.left { padding: 40px; border-right: 1.5px solid #111; }
.left h1 { font-size: 42px; font-weight: 900; }
.left p { opacity: 0.6; margin: 10px 0 30px 0; }
input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1.5px solid #111; font-family: inherit; }
.btn { width: 100%; padding: 16px; background: #111; color: #fff; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
.right { padding: 40px; background: #e9e9e6; display: flex; align-items: center; justify-content: center; }
.card-preview { width: 360px; background: #fff; border: 1.5px solid #111; padding: 30px; }
.card-preview h2 { font-size: 28px; font-weight: 900; }
.card-preview h4 { font-size: 12px; opacity: 0.5; letter-spacing: 1px; margin-top: 5px; }
.info { margin-top: 30px; border-top: 1.5px solid #111; padding-top: 20px; }
.info p { font-size: 13px; margin: 6px 0; }
#qrcode { margin-top: 25px; display: flex; justify-content: center; padding: 15px; background: #fff; border: 1.5px solid #111; }
@media(max-width: 900px){ .wrap { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav style="padding:15px 40px;border-bottom:1.5px solid #111"><a href="index.html" style="text-decoration:none;color:#111;font-weight:900">← TAGIOFFICIAL</a></nav>
<div class="wrap">
<div class="left">
<h1>VİZİTKANI YARAT</h1>
<p>Canlı preview sağda.</p>
<input id="name" placeholder="Ad Soyad">
<input id="job" placeholder="Vezife / Sirket">
<input id="phone" placeholder="Telefon">
<input id="link" placeholder="Instagram / Sayt linki">
<button class="btn" onclick="generate()">QR KODU YARAT →</button>
<p style="font-size:11px;margin-top:15px;opacity:0.5">V2 - Local sistem. Melumatlar brauzerde saxlanir.</p>
</div>
<div class="right">
<div class="card-preview" id="card">
<h2 id="p-name">Ad Soyad</h2>
<h4 id="p-job">VEZIFE</h4>
<div class="info">
<p id="p-phone">+994 __ ___ __ __</p>
<p id="p-link">@tagiofficial</p>
</div>
<div id="qrcode"></div>
</div>
</div>
</div>
<script>
let qr;
const $ = id => document.getElementById(id);
$('name').addEventListener('input', e => $('p-name').innerText = e.target.value || 'Ad Soyad');
$('job').addEventListener('input', e => $('p-job').innerText = (e.target.value || 'VEZIFE').toUpperCase());
$('phone').addEventListener('input', e => $('p-phone').innerText = e.target.value || '+994 __ ___ __ __');
$('link').addEventListener('input', e => $('p-link').innerText = e.target.value || '@tagiofficial');
function generate(){
  const data = `${$('name').value} | ${$('job').value} | ${$('phone').value} | ${$('link').value}`;
  document.getElementById('qrcode').innerHTML = '';
  qr = new QRCode(document.getElementById('qrcode'), { text: data || 'TAGIOFFICIAL', width: 160, height: 160 });
  localStorage.setItem('tagi_card', JSON.stringify({name:$('name').value, job:$('job').value, phone:$('phone').value, link:$('link').value}));
  alert('Vizitka yarandi ve yadda saxlandi!');
}
window.onload = () => {
  const saved = JSON.parse(localStorage.getItem('tagi_card')||'{}');
  if(saved.name){ $('name').value=saved.name; $('job').value=saved.job; $('phone').value=saved.phone; $('link').value=saved.link;
  $('p-name').innerText=saved.name; $('p-job').innerText=saved.job; $('p-phone').innerText=saved.phone; $('p-link').innerText=saved.link; }
}
</script>
</body>
</html>
